<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Truck + Trailer Weight Calculator</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; color: #111; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 1.4rem; margin: .5rem 0 1rem; }
    .grid { display: grid; gap: .8rem; grid-template-columns: repeat(12, 1fr); }
    .card { background: #fff; border-radius: 12px; padding: .9rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .full { grid-column: 1 / -1; }
    .half { grid-column: span 6; }
    label { display: block; font-size: .85rem; margin-bottom: .15rem; font-weight: 600; }
    input, button { width: 100%; box-sizing: border-box; padding: .45rem .55rem; border: 1px solid #c9ced6; border-radius: 8px; }
    button { cursor: pointer; font-weight: 600; }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .6rem; }
    .small { font-size: .85rem; color: #444; }
    .ok { color: #146c2e; }
    .bad { color: #b20f0f; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { text-align: left; padding: .4rem; border-bottom: 1px solid #e9edf2; }
    svg { width: 100%; height: auto; }
    .saveRow { display: grid; grid-template-columns: 1fr auto; gap: .5rem; align-items: center; }
    .warn { margin-top: .5rem; padding: .5rem; border-left: 4px solid #eab308; background: #fffbeb; font-size: .85rem; }
    @media (max-width: 760px) {
      .half { grid-column: 1 / -1; }
      .row, .saveRow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Truck + RV Trailer Weight Distribution Calculator</h1>
    <div class="grid">
      <section class="card half"><h2>Truck Inputs</h2><div class="row">
        <div><label for="truckCurb">Truck Curb Weight (lb)</label><input type="number" id="truckCurb" value="5800"></div>
        <div><label for="truckGvwr">Truck GVWR (lb)</label><input type="number" id="truckGvwr" value="7200"></div>
        <div><label for="truckPayloadCap">Truck Payload Rating (lb)</label><input type="number" id="truckPayloadCap" value="1400"></div>
        <div><label for="towCap">Tow Rating (lb)</label><input type="number" id="towCap" value="9500"></div>
        <div><label for="gcwr">GCWR (lb)</label><input type="number" id="gcwr" value="15000"></div>
        <div><label for="truckCargo">Passengers + Truck Cargo (lb)</label><input type="number" id="truckCargo" value="650"></div>
      </div></section>

      <section class="card half"><h2>Trailer Inputs</h2><div class="row">
        <div><label for="trailerDry">Trailer Dry Weight (lb)</label><input type="number" id="trailerDry" value="6300"></div>
        <div><label for="trailerGvwr">Trailer GVWR (lb)</label><input type="number" id="trailerGvwr" value="8000"></div>
        <div><label for="trailerCargo">Trailer Cargo/Water/etc (lb)</label><input type="number" id="trailerCargo" value="850"></div>
        <div><label for="tonguePct">Loaded Tongue Weight %</label><input type="number" id="tonguePct" value="12.5" step="0.1"></div>
        <div><label for="wdhShift">WDH shifted to truck front axle (lb)</label><input type="number" id="wdhShift" value="220"></div>
        <div><label for="wdhToTrailer">WDH shifted back to trailer axle (lb)</label><input type="number" id="wdhToTrailer" value="80"></div>
      </div></section>

      <section class="card full"><h2>Optional Axle / Tire Limits</h2><div class="row">
        <div><label for="fawr">Truck Front Axle Rating FAWR (lb)</label><input type="number" id="fawr"></div>
        <div><label for="rawr">Truck Rear Axle Rating RAWR (lb)</label><input type="number" id="rawr"></div>
        <div><label for="frontBase">Front axle loaded before hitching (lb)</label><input type="number" id="frontBase" value="3100"></div>
        <div><label for="rearBase">Rear axle loaded before hitching (lb)</label><input type="number" id="rearBase" value="3350"></div>
        <div><label for="frontTireCap">Front Tire Pair Capacity (lb)</label><input type="number" id="frontTireCap"></div>
        <div><label for="rearTireCap">Rear Tire Pair Capacity (lb)</label><input type="number" id="rearTireCap"></div>
      </div><p class="small">Assumption: WDH only redistributes load; it does not reduce actual combined weight.</p></section>

      <section class="card half">
        <h2>Results</h2>
        <table id="resultsTable"></table>
        <div id="warnings" class="warn" hidden></div>
        <div class="saveRow"><a id="saveLink" href="#">(save/share link)</a><button id="copyBtn" type="button">Copy Link</button></div>
      </section>

      <section class="card half"><h2>Weight Diagram</h2><svg viewBox="0 0 640 300" id="diagram" aria-label="weight diagram"></svg></section>
    </div>
  </main>

<script>
const ids=["truckCurb","truckGvwr","truckPayloadCap","towCap","gcwr","truckCargo","trailerDry","trailerGvwr","trailerCargo","tonguePct","wdhShift","wdhToTrailer","fawr","rawr","frontBase","rearBase","frontTireCap","rearTireCap"];
const inputs=Object.fromEntries(ids.map(id=>[id,document.getElementById(id)]));
const num=id=>{const v=parseFloat(inputs[id].value);return Number.isFinite(v)?Math.max(0,v):0;};
const fmt=v=>Math.round(v).toLocaleString();
const row=(label,value,limit=null)=>{const ok=limit==null||value<=limit;const status=limit==null?"":`<span class="${ok?"ok":"bad"}">${ok?"OK":"Over"}</span>`;const lim=limit==null?"":` / ${fmt(limit)} lb`;return `<tr><th>${label}</th><td>${fmt(value)} lb${lim} ${status}</td></tr>`;};

function readStateFromURL(){const p=new URLSearchParams(location.hash.replace(/^#/,""));ids.forEach(id=>{if(p.has(id))inputs[id].value=p.get(id);});}
function writeURL(){const p=new URLSearchParams();ids.forEach(id=>{if(inputs[id].value!=="")p.set(id,inputs[id].value);});const href=`${location.origin}${location.pathname}#${p.toString()}`;saveLink.href=href;saveLink.textContent=href;}

function render(){
  const truckBase=num("truckCurb")+num("truckCargo");
  const trailerLoaded=num("trailerDry")+num("trailerCargo");
  const tongue=trailerLoaded*(num("tonguePct")/100);
  const wdhToFront=Math.min(num("wdhShift"),tongue);
  const wdhToTrailer=Math.min(num("wdhToTrailer"),Math.max(0,tongue-wdhToFront));
  const tongueOnRear=tongue-wdhToFront-wdhToTrailer;

  const truckActual=truckBase+tongue-wdhToTrailer;
  const trailerAxle=trailerLoaded-tongue+wdhToTrailer;
  const combined=truckActual+trailerAxle;

  const payloadUsed=num("truckCargo")+tongue-wdhToTrailer;
  const frontAxle=num("frontBase")+wdhToFront;
  const rearAxle=num("rearBase")+tongueOnRear;

  let html="";
  html+=row("Trailer Loaded",trailerLoaded,num("trailerGvwr")||null);
  html+=row("Estimated Tongue Weight",tongue,null);
  html+=row("Truck Actual Loaded",truckActual,num("truckGvwr")||null);
  html+=row("Combined Actual (Truck + Trailer)",combined,num("gcwr")||null);
  html+=row("Truck Payload Used",payloadUsed,num("truckPayloadCap")||null);
  html+=row("Remaining Truck Payload",Math.max(0,num("truckPayloadCap")-payloadUsed));
  html+=row("Remaining Tow Capacity",Math.max(0,num("towCap")-trailerLoaded));
  html+=row("Remaining GCWR",Math.max(0,num("gcwr")-combined));
  if(num("fawr")) html+=row("Front Axle Load",frontAxle,num("fawr"));
  if(num("rawr")) html+=row("Rear Axle Load",rearAxle,num("rawr"));
  if(num("frontTireCap")) html+=row("Front Tire Pair Load",frontAxle,num("frontTireCap"));
  if(num("rearTireCap")) html+=row("Rear Tire Pair Load",rearAxle,num("rearTireCap"));
  resultsTable.innerHTML=html;

  const warnings=[];
  if(num("tonguePct")<10||num("tonguePct")>15) warnings.push("Tongue weight is typically 10–15% for travel trailers.");
  if(wdhToFront+wdhToTrailer>tongue+0.1) warnings.push("WDH redistribution exceeds estimated tongue weight.");
  warningsEl.hidden=warnings.length===0; warningsEl.textContent=warnings.join(" ");

  const maxW=Math.max(truckBase,tongue,wdhToFront,wdhToTrailer,combined,1), scale=v=>520*v/maxW;
  diagram.innerHTML=`<rect x="20" y="40" width="${scale(truckBase)}" height="26" fill="#4f46e5"/><text x="24" y="58" fill="white" font-size="12">Truck base: ${fmt(truckBase)}</text>
  <rect x="20" y="82" width="${scale(tongue)}" height="26" fill="#f59e0b"/><text x="24" y="100" font-size="12">Tongue: ${fmt(tongue)}</text>
  <rect x="20" y="124" width="${scale(wdhToFront)}" height="26" fill="#10b981"/><text x="24" y="142" font-size="12">WDH to front axle: ${fmt(wdhToFront)}</text>
  <rect x="20" y="166" width="${scale(wdhToTrailer)}" height="26" fill="#22c55e"/><text x="24" y="184" font-size="12">WDH back to trailer axle: ${fmt(wdhToTrailer)}</text>
  <rect x="20" y="216" width="${scale(combined)}" height="32" fill="#334155"/><text x="24" y="236" fill="white" font-size="12">Combined actual: ${fmt(combined)}</text>`;

  writeURL();
}

const saveLink=document.getElementById("saveLink");
const warningsEl=document.getElementById("warnings");
const resultsTable=document.getElementById("resultsTable");
const diagram=document.getElementById("diagram");
document.getElementById("copyBtn").addEventListener("click",async()=>{try{await navigator.clipboard.writeText(saveLink.href);}catch{}});
readStateFromURL(); ids.forEach(id=>inputs[id].addEventListener("input",render)); render();
</script>
</body>
</html>
